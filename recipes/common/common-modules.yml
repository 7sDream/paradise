---
# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json
modules:
  - type: files
    files:
      - source: system/usr
        destination: /usr
      - source: system/etc
        destination: /etc
  - type: dnf
    remove:
      packages:
        - firefox
        - firefox-langpacks
  - type: os-release
    properties:
      ID_LIKE: paradise
      NAME: paradise
      PRETTY_NAME: Paradise OS (FROM Fedora base-atomic)
      CPE: cpe:/o:paradise:paradise:43
      DEFAULT_HOSTNAME: paradise
      HOME_URL: https://github.com/7sDream/paradise
      DOCUMENTATION_URL: https://github.com/7sDream/paradise
      SUPPORT_URL: https://github.com/7sDream/paradise/issue
      BUG_REPORT_URL: https://github.com/7sDream/paradise/issue
