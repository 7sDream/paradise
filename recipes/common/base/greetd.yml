# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json
# remove wayblue installed sddm packages and replace it with greetd and tuigreet
modules:
  - type: dnf
    remove:
      packages:
        - sddm-wayland-generic
        - sddm-themes
        - sddm
        - qt5-graphicaleffects
        - qt5-quickcontrols2
        - qt5-svg
    install:
      packages:
        - greetd
        - greetd-selinux
        - tuigreet
  - type: systemd
    system:
      enabled:
        - greetd
      disabled:
        - sddm-boot # from wayblue
  - type: script
    snippets:
      - rm -rf /etc/sddm.conf.d # theme config
      - rm -rf /etc/sddm # sddm-useradd script
      - rm /usr/lib/systemd/system/sddm-boot.service # sddm-boot service
